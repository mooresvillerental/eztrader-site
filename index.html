<!DOCTYPE html>
<html>
<head>
<title>EZTrader Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{
background:#0b1220;
color:white;
font-family:Arial;
text-align:center;
padding:40px;
}

h1{
font-size:42px;
}

.card{
background:#162038;
padding:20px;
margin:15px;
border-radius:10px;
display:inline-block;
width:250px;
}

.price{
font-size:28px;
color:#00ff9c;
}

.signal{
font-size:32px;
font-weight:bold;
}

.buy{color:#00ff9c;}
.sell{color:#ff4d4d;}
.hold{color:#ffd24d;}
</style>
</head>

<body>

<h1>EZTrader</h1>
<p>AI Trading Command Center</p>

<div class="card">
<h3>BTC Price</h3>
<div class="price" id="price">Loading...</div>
</div>

<div class="card">
<h3>Market Signal</h3>
<div class="signal hold" id="signal">HOLD</div>
</div>

<div class="card">
<h3>Bot Status</h3>
<div id="status">Engine Online</div>
</div>
<div class="card">
<h3>Confidence</h3>
<div id="confidence">--</div>
</div>

<div class="card">
<h3>Strategy</h3>
<div id="strategy">--</div>
</div>

<div class="card">
<h3>Market Regime</h3>
<div id="regime">--</div>
</div>

<div class="card">
<h3>Trend</h3>
<div id="trend">--</div>
</div><div class="card">
<h3>Portfolio Value</h3>
<div id="portfolio_value">--</div>
</div>

<div class="card">
<h3>Cash Balance</h3>
<div id="cash_usd">--</div>
</div>

<div class="card">
<h3>BTC Holdings</h3>
<div id="btc_qty">--</div>
</div>

<div class="card">
<h3>Average Entry</h3>
<div id="avg_price">--</div>
</div>

<div class="card">
<h3>Current BTC Price</h3>
<div id="current_price">--</div>
</div>

<div class="card">
<h3>Unrealized P/L</h3>
<div id="unrealized_pl">--</div>
</div>
<script>

async function updatePrice() {

const r = await fetch("https://api.coinbase.com/v2/prices/BTC-USD/spot")
const data = await r.json()

document.getElementById("price").innerText =
"$"+parseFloat(data.data.amount).toLocaleString()

}

async function updateSignal(){

const r = await fetch("signal.json")
const data = await r.json()

document.getElementById("signal").innerText = data.action
document.getElementById("status").innerText = data.status
document.getElementById("confidence").innerText = data.confidence + "%"
document.getElementById("strategy").innerText = data.strategy
document.getElementById("regime").innerText = data.regime
document.getElementById("trend").innerText = data.trend

}

async function updatePortfolio(){

const r = await fetch("portfolio.json")
const data = await r.json()

document.getElementById("portfolio_value").innerText =
"$"+data.portfolio_value.toLocaleString()

document.getElementById("cash_usd").innerText =
"$"+data.cash_usd.toLocaleString()

document.getElementById("btc_qty").innerText =
data.btc_qty.toFixed(6)

document.getElementById("avg_price").innerText =
"$"+data.avg_price.toLocaleString()

document.getElementById("current_price").innerText =
"$"+data.current_price.toLocaleString()

document.getElementById("unrealized_pl").innerText =
"$"+data.unrealized_pl.toLocaleString()

}

updatePrice()
updateSignal()
updatePortfolio()

setInterval(updatePrice,5000)
setInterval(updateSignal,5000)
setInterval(updatePortfolio,5000)
</script>

</body>
</html>
